# ============================================================
# Cachola OS — Nginx Produção (VPS Hostinger)
# IMPORTANTE: Substitua app.cacholaos.com.br pelo domínio real
# ============================================================

events {
  worker_connections 2048;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/atom+xml image/svg+xml;
  gzip_min_length 1000;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  upstream nextjs_app {
    server app:3000;
    keepalive 64;
  }

  upstream supabase_kong {
    server supabase-kong:8000;
    keepalive 64;
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name app.cacholaos.com.br;  # TODO: substituir pelo domínio real

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl http2;
    server_name app.cacholaos.com.br;  # TODO: substituir pelo domínio real

    # SSL — gerenciado pelo Certbot
    ssl_certificate /etc/letsencrypt/live/app.cacholaos.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.cacholaos.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Headers de segurança
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # App Next.js
    location / {
      proxy_pass http://nextjs_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_cache_bypass $http_upgrade;

      # Timeout para SSE/streaming
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }

    # Supabase API
    location ~ ^/(auth|rest|realtime|storage|graphql)/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass http://supabase_kong;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # Upload — limite maior para fotos
    location /storage/ {
      client_max_body_size 50M;
      proxy_pass http://supabase_kong;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}

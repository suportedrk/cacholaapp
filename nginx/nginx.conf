# ============================================================
# Cachola OS — Nginx (Desenvolvimento Local)
# Referência apenas — não é usado no docker-compose.yml dev
# ============================================================

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_min_length 1000;

  upstream nextjs_app {
    server app:3000;
  }

  upstream supabase_kong {
    server supabase-kong:8000;
  }

  server {
    listen 80;
    server_name localhost;

    # App Next.js
    location / {
      proxy_pass http://nextjs_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Supabase API (auth, rest, storage, realtime)
    location /supabase/ {
      rewrite ^/supabase/(.*) /$1 break;
      proxy_pass http://supabase_kong;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

# ============================================================
# CACHOLA OS — Docker Compose Produção (VPS Hostinger)
# ============================================================
# Pré-requisitos na VPS:
#   - Docker + Docker Compose instalados
#   - Domínio apontando para o IP da VPS
#   - Portas 80 e 443 liberadas no firewall
#
# Como usar:
#   1. Clone o repo na VPS
#   2. Copie .env.example para .env e preencha TODAS as variáveis
#   3. docker compose -f docker-compose.prod.yml up -d
#   4. Obter SSL: docker compose -f docker-compose.prod.yml run --rm certbot
# ============================================================

name: cacholaos-prod

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.8.1.084
    container_name: cacholaos-db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Supabase Auth
  # ──────────────────────────────────────────────────────────
  supabase-auth:
    image: supabase/gotrue:v2.170.0
    container_name: cacholaos-auth
    restart: always
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}     # https://app.cacholaos.com.br
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: ${SITE_URL}              # https://app.cacholaos.com.br
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Cachola OS}
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # PostgREST
  # ──────────────────────────────────────────────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: cacholaos-rest
    restart: always
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?sslmode=disable
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Realtime
  # ──────────────────────────────────────────────────────────
  supabase-realtime:
    image: supabase/realtime:v2.34.47
    container_name: cacholaos-realtime
    restart: always
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3bhZAKlR38
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Storage
  # ──────────────────────────────────────────────────────────
  supabase-storage:
    image: supabase/storage-api:v1.22.8
    container_name: cacholaos-storage
    restart: always
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?sslmode=disable
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Imgproxy
  # ──────────────────────────────────────────────────────────
  supabase-imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: cacholaos-imgproxy
    restart: always
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage_data:/var/lib/storage
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Kong
  # ──────────────────────────────────────────────────────────
  supabase-kong:
    image: kong:2.8.1
    container_name: cacholaos-kong
    restart: always
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
    volumes:
      - ./docker/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # App Next.js — Produção
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cacholaos-app
    restart: always
    depends_on:
      supabase-kong:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${API_EXTERNAL_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${SITE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${SITE_URL}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.0}
      NEXT_PUBLIC_APP_NAME: Cachola OS
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Nginx — Reverse proxy + SSL
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cacholaos-nginx
    restart: always
    depends_on:
      - app
      - supabase-kong
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - cacholaos-net

  # ──────────────────────────────────────────────────────────
  # Certbot — SSL automático via Let's Encrypt
  # ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: cacholaos-certbot
    # Para obter certificado pela primeira vez:
    #   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
    #     --webroot --webroot-path=/var/www/certbot \
    #     --email admin@cacholaos.com.br \  # TODO: substituir pelo email real
    #     --agree-tos --no-eff-email \
    #     -d app.cacholaos.com.br            # TODO: substituir pelo domínio real
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - cacholaos-net

# ──────────────────────────────────────────────────────────
# Volumes persistentes (produção)
# ──────────────────────────────────────────────────────────
volumes:
  db_data:
  storage_data:
  certbot_certs:
  certbot_www:

# ──────────────────────────────────────────────────────────
# Rede
# ──────────────────────────────────────────────────────────
networks:
  cacholaos-net:
    driver: bridge
